<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Design canvas</title>
<!--
  design_canvas — compare 2+ options side by side. Each option is an <article class="option">
  with a label; they sit on a responsive grid. Use when exploring directions before committing.
  Keep options to real variants (not filler). Pure CSS layout; no JS needed.
-->
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f4f4f5; font-family: ui-sans-serif, system-ui, sans-serif; color: #18181b; }
  header { padding: 24px 32px 8px; }
  header h1 { margin: 0; font-size: 18px; } header p { margin: 4px 0 0; color: #71717a; font-size: 13px; }
  .grid {
    display: grid; gap: 24px; padding: 24px 32px 48px;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  }
  .option { background: #fff; border: 1px solid #e4e4e7; border-radius: 14px; overflow: hidden; }
  .option > .tag {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #e4e4e7; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; color: #71717a;
  }
  .option > .body { padding: 24px; min-height: 280px; }
</style>
</head>
<body>
  <header>
    <h1>Option comparison</h1>
    <p>Each panel is one real variant — label what differs, drop filler.</p>
  </header>
  <div class="grid">
    <article class="option"><div class="tag"><span>Option A</span><span>warm · minimal</span></div>
      <div class="body"><!-- variant A here --></div></article>
    <article class="option"><div class="tag"><span>Option B</span><span>cool · dense</span></div>
      <div class="body"><!-- variant B here --></div></article>
  </div>
</body>
</html>
