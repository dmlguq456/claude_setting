<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Tweakable preview</title>
<!--
  tweaks_panel — the VARIANT mechanism. When the user asks for "another version" or
  "try a different color/font", do NOT spawn new files. Add a tweak here: a single
  preview that toggles design choices live and persists them (localStorage).

  HOST PROTOCOL
    - The panel only ever sets CSS custom properties on :root (--accent, --font, --radius, --density).
    - Your host content (the preview) consumes those vars. Never hard-code the tweakable values.
    - Colors are CURATED swatches (3–4), not a free picker — keeps choices coherent.
  Extend the `TWEAKS` config below; the panel renders itself from it.
-->
<style>
  :root {
    /* tweakable tokens (the panel writes these) */
    --accent: oklch(0.62 0.19 29);
    --font: ui-sans-serif, system-ui, sans-serif;
    --radius: 10px;
    --density: 16px;
    /* fixed */
    --bg: #fafafa; --fg: #18181b; --muted: #71717a; --card: #fff; --border: #e4e4e7;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font); background: var(--bg); color: var(--fg); }

  /* ---- HOST CONTENT (replace with your design; just consume the vars) ---- */
  .preview { min-height: 100vh; display: grid; place-items: center; padding: 48px; }
  .card {
    width: min(420px, 100%); background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: calc(var(--density) * 1.5);
    box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
  }
  .card h2 { margin: 0 0 var(--density); font-size: 22px; }
  .card p { margin: 0 0 calc(var(--density) * 1.25); color: var(--muted); line-height: 1.5; }
  .btn {
    appearance: none; border: 0; cursor: pointer; color: #fff; background: var(--accent);
    border-radius: calc(var(--radius) * 0.7); padding: 12px 20px; font: inherit; font-weight: 600;
  }

  /* ---- THE PANEL (generic; renders from TWEAKS) ---- */
  .panel {
    position: fixed; top: 16px; right: 16px; width: 240px; z-index: 50;
    background: rgb(255 255 255 / 0.9); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 12px; padding: 14px;
    font: 13px/1.4 ui-sans-serif, system-ui, sans-serif; box-shadow: 0 8px 30px rgb(0 0 0 / 0.12);
  }
  .panel h3 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #71717a; }
  .row { margin-bottom: 12px; }
  .row > label { display: block; margin-bottom: 6px; color: #52525b; font-weight: 600; }
  .swatches { display: flex; gap: 8px; }
  .swatches button { width: 28px; height: 28px; border-radius: 9999px; border: 2px solid transparent; cursor: pointer; }
  .swatches button[aria-pressed="true"] { border-color: #18181b; }
  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg button {
    flex: 1; min-width: 56px; padding: 6px 8px; border: 1px solid var(--border); background: #fff;
    border-radius: 8px; cursor: pointer; font: inherit;
  }
  .seg button[aria-pressed="true"] { background: #18181b; color: #fff; border-color: #18181b; }
  .panel .reset { width: 100%; margin-top: 4px; padding: 6px; border: 0; background: transparent; color: #a1a1aa; cursor: pointer; }
</style>
</head>
<body>
  <main class="preview">
    <div class="card">
      <h2>Tweakable card</h2>
      <p>Change the accent, font, radius, and density from the panel — the choice persists.</p>
      <button class="btn">Primary action</button>
    </div>
  </main>

  <aside class="panel" id="panel" aria-label="Design tweaks"></aside>

  <script>
    // Curated, coherent choices — not a free-for-all.
    const TWEAKS = {
      accent: { label: "Accent", type: "swatch", var: "--accent",
        options: ["oklch(0.62 0.19 29)", "oklch(0.65 0.15 250)", "oklch(0.7 0.16 150)", "oklch(0.7 0.13 300)"] },
      font: { label: "Font", type: "seg", var: "--font",
        options: { "Sans": "ui-sans-serif, system-ui, sans-serif", "Serif": "ui-serif, Georgia, serif", "Mono": "ui-monospace, monospace" } },
      radius: { label: "Radius", type: "seg", var: "--radius",
        options: { "Sharp": "4px", "Soft": "10px", "Round": "20px" } },
      density: { label: "Density", type: "seg", var: "--density",
        options: { "Tight": "12px", "Default": "16px", "Airy": "22px" } },
    };
    const KEY = "tweaks_panel:v1";
    const state = JSON.parse(localStorage.getItem(KEY) || "{}");
    const panel = document.getElementById("panel");

    function apply() {
      for (const [k, cfg] of Object.entries(TWEAKS)) {
        const v = state[k] ?? (cfg.type === "swatch" ? cfg.options[0] : Object.values(cfg.options)[0]);
        document.documentElement.style.setProperty(cfg.var, v);
      }
      localStorage.setItem(KEY, JSON.stringify(state));
    }
    function render() {
      panel.innerHTML = "<h3>Tweaks</h3>";
      for (const [k, cfg] of Object.entries(TWEAKS)) {
        const row = document.createElement("div"); row.className = "row";
        row.innerHTML = "<label>" + cfg.label + "</label>";
        if (cfg.type === "swatch") {
          const wrap = document.createElement("div"); wrap.className = "swatches";
          cfg.options.forEach((val) => {
            const b = document.createElement("button"); b.style.background = val;
            b.setAttribute("aria-pressed", String((state[k] ?? cfg.options[0]) === val));
            b.onclick = () => { state[k] = val; apply(); render(); };
            wrap.appendChild(b);
          });
          row.appendChild(wrap);
        } else {
          const wrap = document.createElement("div"); wrap.className = "seg";
          const cur = state[k] ?? Object.values(cfg.options)[0];
          for (const [name, val] of Object.entries(cfg.options)) {
            const b = document.createElement("button"); b.textContent = name;
            b.setAttribute("aria-pressed", String(cur === val));
            b.onclick = () => { state[k] = val; apply(); render(); };
            wrap.appendChild(b);
          }
          row.appendChild(wrap);
        }
        panel.appendChild(row);
      }
      const reset = document.createElement("button");
      reset.className = "reset"; reset.textContent = "Reset";
      reset.onclick = () => { for (const k of Object.keys(state)) delete state[k]; apply(); render(); };
      panel.appendChild(reset);
    }
    apply(); render();
  </script>
</body>
</html>
