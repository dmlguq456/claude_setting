<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Image slots</title>
<!--
  image_slot — a placeholder the user fills by drag-and-drop (persists to localStorage).
  Use INSTEAD of faking imagery with SVG. An empty slot reads as "product shot goes here"
  via a striped placeholder + monospace caption (per design rules: don't forge images).
  Each .slot needs a unique data-key.
-->
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 48px; background: #fafafa; font-family: ui-sans-serif, system-ui, sans-serif; }
  .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .slot {
    position: relative; aspect-ratio: 4 / 3; border-radius: 12px; overflow: hidden;
    border: 2px dashed #d4d4d8; background-image: repeating-linear-gradient(45deg, #f4f4f5 0 12px, #eaeaec 12px 24px);
    display: grid; place-items: center; cursor: pointer; transition: border-color .15s;
  }
  .slot.over { border-color: #18181b; }
  .slot .hint { font: 12px ui-monospace, monospace; color: #71717a; text-align: center; padding: 12px; pointer-events: none; }
  .slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .slot .clear {
    position: absolute; top: 8px; right: 8px; z-index: 2; border: 0; cursor: pointer;
    background: rgb(0 0 0 / 0.6); color: #fff; border-radius: 9999px; width: 24px; height: 24px; display: none;
  }
  .slot.filled .clear { display: block; } .slot.filled .hint { display: none; }
</style>
</head>
<body>
  <div class="grid">
    <div class="slot" data-key="hero"><span class="hint">drop image — "hero / product shot"</span><button class="clear" title="제거">×</button></div>
    <div class="slot" data-key="feature1"><span class="hint">drop image — "feature 1"</span><button class="clear" title="제거">×</button></div>
    <div class="slot" data-key="feature2"><span class="hint">drop image — "feature 2"</span><button class="clear" title="제거">×</button></div>
  </div>

  <script>
    const KEY = "image_slot:v1";
    const store = JSON.parse(localStorage.getItem(KEY) || "{}");
    document.querySelectorAll(".slot").forEach((slot) => {
      const key = slot.dataset.key;
      const set = (dataUrl) => {
        slot.querySelectorAll("img").forEach((n) => n.remove());
        if (dataUrl) {
          const img = new Image(); img.src = dataUrl; slot.prepend(img); slot.classList.add("filled");
          store[key] = dataUrl;
        } else { slot.classList.remove("filled"); delete store[key]; }
        localStorage.setItem(KEY, JSON.stringify(store));
      };
      if (store[key]) set(store[key]);
      const read = (file) => { const r = new FileReader(); r.onload = () => set(r.result); r.readAsDataURL(file); };
      slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("over"); });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", (e) => {
        e.preventDefault(); slot.classList.remove("over");
        const f = e.dataTransfer.files[0]; if (f && f.type.startsWith("image/")) read(f);
      });
      slot.addEventListener("click", () => {
        const inp = document.createElement("input"); inp.type = "file"; inp.accept = "image/*";
        inp.onchange = () => inp.files[0] && read(inp.files[0]); inp.click();
      });
      slot.querySelector(".clear").addEventListener("click", (e) => { e.stopPropagation(); set(null); });
    });
  </script>
</body>
</html>
