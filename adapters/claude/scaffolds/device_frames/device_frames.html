<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Device frames</title>
<!--
  device_frames — bezels for mockups, so screenshots read as real product shots.
  Two frames included: .ios-frame (phone, status bar + home indicator) and
  .browser-frame (desktop chrome, traffic lights + address bar).
  Put your screen markup inside .screen / .viewport. Frames are pure CSS — no JS.
-->
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; gap: 64px; flex-wrap: wrap;
    align-items: center; justify-content: center; padding: 64px;
    background: #f4f4f5; font-family: ui-sans-serif, system-ui, sans-serif;
  }

  /* ---------- iOS phone frame (393×852, iPhone-ish) ---------- */
  .ios-frame {
    width: 393px; height: 852px; background: #000; border-radius: 56px;
    padding: 12px; box-shadow: 0 30px 60px -20px rgb(0 0 0 / 0.4);
  }
  .ios-frame .screen {
    position: relative; width: 100%; height: 100%; border-radius: 44px; overflow: hidden;
    background: #fff;
  }
  .ios-frame .statusbar {
    position: absolute; top: 0; inset-inline: 0; height: 54px; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; font-size: 15px; font-weight: 600; color: #18181b;
  }
  .ios-frame .notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; background: #000; border-radius: 9999px; z-index: 3;
  }
  .ios-frame .viewport { position: absolute; inset: 54px 0 0; overflow: auto; }
  .ios-frame .home-indicator {
    position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; background: #18181b; border-radius: 9999px; z-index: 3;
  }

  /* ---------- Browser window frame ---------- */
  .browser-frame {
    width: min(900px, 90vw); background: #fff; border-radius: 12px; overflow: hidden;
    box-shadow: 0 30px 60px -20px rgb(0 0 0 / 0.35); border: 1px solid #e4e4e7;
  }
  .browser-frame .chrome {
    display: flex; align-items: center; gap: 12px; height: 44px; padding: 0 16px;
    background: #f4f4f5; border-bottom: 1px solid #e4e4e7;
  }
  .browser-frame .lights { display: flex; gap: 8px; }
  .browser-frame .lights span { width: 12px; height: 12px; border-radius: 9999px; }
  .browser-frame .lights .r { background: #ff5f57; } .browser-frame .lights .y { background: #febc2e; } .browser-frame .lights .g { background: #28c840; }
  .browser-frame .url {
    flex: 1; height: 28px; background: #fff; border: 1px solid #e4e4e7; border-radius: 8px;
    display: flex; align-items: center; padding: 0 12px; color: #71717a; font-size: 13px;
  }
  .browser-frame .viewport { height: 540px; overflow: auto; }

  /* demo content (replace) */
  .demo { padding: 32px; }
  .demo h1 { font-size: 28px; margin: 0 0 8px; }
  .demo p { color: #71717a; }
</style>
</head>
<body>
  <!-- iOS -->
  <div class="ios-frame">
    <div class="screen">
      <div class="notch"></div>
      <div class="statusbar"><span>9:41</span><span>▢ ▣ ▮</span></div>
      <div class="viewport">
        <!-- your mobile screen here -->
        <div class="demo"><h1>Mobile screen</h1><p>Put your app screen in .viewport.</p></div>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>

  <!-- Browser -->
  <div class="browser-frame">
    <div class="chrome">
      <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="url">app.example.com</div>
    </div>
    <div class="viewport">
      <!-- your desktop screen here -->
      <div class="demo"><h1>Desktop screen</h1><p>Put your web app in .viewport.</p></div>
    </div>
  </div>
</body>
</html>
