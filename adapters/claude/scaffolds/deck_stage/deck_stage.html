<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deck</title>
<!--
  deck_stage — self-contained HTML slide deck shell.
  Fixed 1920×1080 canvas, auto-scaled to any viewport with letterboxing.
  Keyboard nav (← → Space Home End), slide counter, and print-to-PDF (1 slide = 1 page).

  HOW TO USE
    1. Copy this file. Replace the <section class="slide"> blocks with your slides.
    2. Each slide is exactly 1920×1080. Author at that size — do NOT scale yourself.
    3. Body text ≥ 24px (per design rules / scale). Controls live OUTSIDE the scaled deck.
    4. Open in a browser (or render via Design MCP). Print → "Save as PDF" gives 1 slide/page.
    5. Speaker notes (optional): a <script type="application/json" id="speaker-notes">[...]</script>
       array — read by the PPTX converter. Not displayed.
-->
<style>
  :root { --deck-w: 1920px; --deck-h: 1080px; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #0b0b0c;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  /* full-viewport stage; the deck is scaled to fit inside it (letterboxed) */
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .deck {
    width: var(--deck-w); height: var(--deck-h);
    position: relative;
    transform-origin: center center;
    background: #fff;
    box-shadow: 0 8px 40px rgb(0 0 0 / 0.5);
    overflow: hidden;
  }
  .slide {
    position: absolute; inset: 0;
    width: var(--deck-w); height: var(--deck-h);
    padding: 96px 128px;
    display: none;
    flex-direction: column;
    background: #ffffff; color: #18181b;
    font-size: 28px; line-height: 1.5;
  }
  .slide.active { display: flex; }
  .slide h1 { font-size: 84px; line-height: 1.05; margin: 0 0 24px; letter-spacing: -0.02em; }
  .slide h2 { font-size: 56px; line-height: 1.1; margin: 0 0 32px; }
  .slide ul { margin: 0; padding-left: 1.2em; }
  .slide li { margin: 0 0 16px; }

  /* controls — kept OUTSIDE the scaled deck so they stay crisp & fixed */
  .controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 16px;
    color: #d4d4d8; font-size: 14px; font-variant-numeric: tabular-nums;
    background: rgb(255 255 255 / 0.06); padding: 8px 16px; border-radius: 9999px;
    backdrop-filter: blur(8px); user-select: none;
  }
  .controls button {
    appearance: none; border: 0; background: transparent; color: inherit;
    font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .controls button:hover { background: rgb(255 255 255 / 0.1); }

  /* PRINT: every slide becomes one full page, unscaled. 1 slide = 1 page. */
  @page { size: 1920px 1080px; margin: 0; }
  @media print {
    body { background: #fff; overflow: visible; }
    .stage { position: static; display: block; }
    .controls { display: none; }
    .deck { transform: none !important; box-shadow: none; width: auto; height: auto; }
    .slide { display: flex !important; position: relative; inset: auto; page-break-after: always; }
    .slide:last-child { page-break-after: auto; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="deck" id="deck">
      <!-- ↓↓↓ REPLACE these example slides ↓↓↓ -->
      <section class="slide active">
        <h1>Deck title</h1>
        <p>One-line subtitle or framing for the talk.</p>
      </section>
      <section class="slide">
        <h2>A point worth a slide</h2>
        <ul>
          <li>Each bullet earns its place — no filler.</li>
          <li>Body text stays ≥ 24px at the 1920×1080 canvas.</li>
        </ul>
      </section>
      <section class="slide">
        <h2>Closing</h2>
        <p>End on the one thing you want remembered.</p>
      </section>
      <!-- ↑↑↑ REPLACE these example slides ↑↑↑ -->
    </div>
  </div>

  <div class="controls">
    <button id="prev" aria-label="이전">‹</button>
    <span id="counter">1 / 1</span>
    <button id="next" aria-label="다음">›</button>
  </div>

  <script>
    const deck = document.getElementById("deck");
    const slides = Array.from(deck.querySelectorAll(".slide"));
    const counter = document.getElementById("counter");
    let i = Math.max(0, slides.findIndex((s) => s.classList.contains("active")));
    if (i < 0) i = 0;

    // Auto-scale the fixed 1920×1080 deck to fit the viewport (letterbox).
    function fit() {
      const m = 0.96; // small margin so the deck never kisses the edges
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080) * m;
      deck.style.transform = "scale(" + s + ")";
    }
    function show(n) {
      i = (n + slides.length) % slides.length;
      slides.forEach((s, k) => s.classList.toggle("active", k === i));
      counter.textContent = (i + 1) + " / " + slides.length;
      location.hash = "#" + (i + 1);
    }
    document.getElementById("next").onclick = () => show(i + 1);
    document.getElementById("prev").onclick = () => show(i - 1);
    window.addEventListener("resize", fit);
    window.addEventListener("keydown", (e) => {
      if (["ArrowRight", " ", "PageDown"].includes(e.key)) { e.preventDefault(); show(i + 1); }
      else if (["ArrowLeft", "PageUp"].includes(e.key)) { e.preventDefault(); show(i - 1); }
      else if (e.key === "Home") show(0);
      else if (e.key === "End") show(slides.length - 1);
    });
    const fromHash = parseInt((location.hash || "").slice(1), 10);
    fit();
    show(Number.isFinite(fromHash) ? fromHash - 1 : i);
  </script>

  <!-- optional, for PPTX converter; safe to leave empty -->
  <script type="application/json" id="speaker-notes">[]</script>
</body>
</html>
